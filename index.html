<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Garment Code : Professional Edition</title>
    
    <link rel="manifest" href="manifest.json">
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="shortcut icon" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="application-name" content="Garment Code">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background: #475569; }
        
        .garment-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .garment-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.1); border-color: #10b981; }
        .tag-pill { font-feature-settings: "tnum"; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 h-[100dvh] flex flex-col md:flex-row overflow-hidden transition-colors duration-300">

    <header class="md:hidden bg-slate-900 text-white p-4 flex justify-between items-center z-50 shadow-lg shrink-0 h-16">
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="Logo" class="w-8 h-8 object-contain">
            <h1 class="font-bold tracking-wide text-lg">GARMENT CODE</h1>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="toggleDarkMode()" class="p-2 text-slate-300 hover:text-white transition-colors rounded-full hover:bg-slate-800">
                <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
                <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
            </button>
            <button id="mobileMenuBtn" class="p-2 text-slate-300 hover:text-white"><i data-lucide="menu"></i></button>
        </div>
    </header>

    <aside id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 w-72 bg-[#0f172a] text-slate-400 flex flex-col z-50 transition-transform duration-300 border-r border-slate-800 shadow-2xl h-full">
        <div class="p-6 bg-[#0f172a] border-b border-slate-800 hidden md:block shrink-0">
            <div class="flex items-center gap-4 mb-1">
                <img src="logo.png" alt="Logo" class="w-12 h-12 object-contain">
                <div><h1 class="text-xl font-bold text-white tracking-tight leading-none">GARMENT<br>CODE</h1></div>
            </div>
            <p class="text-[10px] text-emerald-500 font-bold uppercase tracking-widest mt-4 ml-1">Professional Guide v3.2</p>
        </div>

        <div class="md:hidden flex items-center justify-between p-4 border-b border-slate-800 shrink-0 bg-[#0f172a]">
            <span class="text-sm font-bold text-white tracking-wider">MENU</span>
            <button onclick="toggleMenu()" class="p-1 text-slate-400 hover:text-white rounded-md bg-slate-800/50">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <div class="p-4 border-b border-slate-800/50 shrink-0 bg-[#0f172a] z-10">
            <button onclick="filter('ALL')" class="w-full text-left px-4 py-3 rounded-xl text-sm font-bold text-white hover:bg-slate-800 transition-all border border-emerald-500/30 bg-emerald-500/10 flex items-center gap-3 group">
                <div class="bg-emerald-500 p-1 rounded-md text-white group-hover:scale-110 transition-transform">
                    <i data-lucide="layout-grid" class="w-3.5 h-3.5"></i>
                </div>
                전체 라이브러리
            </button>
        </div>

        <nav class="flex-1 overflow-y-auto px-4 py-2 custom-scroll" id="categoryNav"></nav>

        <div class="p-5 bg-[#0b1120] border-t border-slate-800 shrink-0">
            <div class="flex justify-between items-center text-xs">
                <span class="text-slate-500 font-medium">Total Database</span>
                <span id="totalCount" class="text-emerald-400 font-bold text-sm">Loading...</span>
            </div>
            <div class="w-full bg-slate-800 h-1 mt-2 rounded-full overflow-hidden">
                <div class="bg-emerald-500 h-full w-full opacity-75"></div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative w-full bg-[#f8fafc] dark:bg-[#0b1120] transition-colors duration-300">
        <div class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-6 py-4 flex flex-col md:flex-row items-center justify-between gap-4 z-20 shrink-0 sticky top-0 shadow-sm transition-colors duration-300">
            <div class="w-full md:w-auto flex items-center justify-between md:justify-start gap-4">
                <div>
                    <h2 id="currentCategoryTitle" class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                        <i data-lucide="layers" class="text-emerald-600 dark:text-emerald-400"></i> 전체 라이브러리
                    </h2>
                    <p class="text-xs text-slate-500 dark:text-slate-400 mt-1 font-medium">실시간 데이터 검색 엔진</p>
                </div>
                <button onclick="toggleDarkMode()" class="hidden md:flex p-2 text-slate-400 hover:text-slate-600 dark:text-slate-500 dark:hover:text-slate-300 transition-colors rounded-full hover:bg-slate-100 dark:hover:bg-slate-800">
                    <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
                    <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                </button>
            </div>
            <div class="relative w-full md:w-96 group">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i data-lucide="search" class="h-4 w-4 text-slate-400 group-focus-within:text-emerald-500 transition-colors"></i>
                </div>
                <input type="text" id="searchInput" class="block w-full pl-10 pr-3 py-2.5 border border-slate-200 dark:border-slate-700 rounded-xl leading-5 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all text-sm font-medium shadow-sm" placeholder="지식 검색 (예: 40수, 지퍼, 다트...)">
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4 md:p-8 custom-scroll" id="mainScroll">
            <div id="gridContainer" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-6 pb-20"></div>
            <div id="emptyState" class="hidden flex-col items-center justify-center h-full text-slate-400 mt-20">
                <div class="bg-white dark:bg-slate-800 p-6 rounded-full shadow-sm border border-slate-100 dark:border-slate-700 mb-4 transition-colors"><i data-lucide="file-search" class="w-12 h-12 text-slate-300 dark:text-slate-600"></i></div>
                <p class="text-lg font-bold text-slate-600 dark:text-slate-400">검색 결과가 없습니다.</p>
                <p class="text-sm text-slate-400 dark:text-slate-500 mt-1">다른 키워드나 현장 용어로 검색해보세요.</p>
            </div>
        </div>
    </main>
    <div id="overlay" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-30 hidden md:hidden transition-opacity"></div>

    <script>
        const DB = [
            // [1] 원단
            { cat: '원단 (직기/천연)', sub: '면', name: '광목 (Muslin)', alias: '생지', desc: '정련이나 표백을 하지 않은 자연 상태의 무명천.', pros: '가격 저렴, 내추럴한 느낌.', cons: '수축 심함, 거친 표면.', usage: '가봉용, 에코백, 홈패션.', tip: '가봉 볼 때 가장 많이 쓰임.' },
            { cat: '원단 (직기/천연)', sub: '면', name: '옥스포드 (Oxford)', alias: '', desc: '바구니 짜기 방식으로 짠 톡톡한 면직물.', pros: '통기성 좋음, 튼튼함.', cons: '구김 발생, 투박함.', usage: '셔츠, 남방, 침구.', tip: '20수, 40수 많이 사용.' },
            { cat: '원단 (직기/천연)', sub: '면', name: '포플린 (Poplin)', alias: '다후다(오용)', desc: '경사 밀도가 높은 촘촘한 평직물. 표면이 매끄러움.', pros: '가볍고 부드러움, 광택.', cons: '주름이 잘 생김.', usage: '드레스 셔츠, 블라우스.', tip: '고급 셔츠의 기본 소재.' },
            { cat: '원단 (직기/천연)', sub: '면', name: '거즈 (Gauze)', alias: '이중거즈', desc: '성글게 짠 얇은 면직물. 보통 두 겹을 겹쳐 사용.', pros: '흡습성, 통기성 최상, 부드러움.', cons: '내구성이 약해 잘 찢어짐.', usage: '유아복, 손수건, 여름 잠옷.', tip: '봉제 시 원단이 밀리기 쉬움.' },
            { cat: '원단 (직기/천연)', sub: '면', name: '코듀로이 (Corduroy)', alias: '골덴', desc: '세로 방향의 골이 있는 파일 직물.', pros: '보온성 우수, 내구성.', cons: '결 방향 주의(역결 재단).', usage: '겨울 바지, 자켓.', tip: '골 굵기에 따라 핀웨일, 왕골로 나뉨.' },
            { cat: '원단 (직기/천연)', sub: '면', name: '데님 (Denim)', alias: '청지', desc: '경사에 색실, 위사에 흰실을 쓴 능직물.', pros: '매우 튼튼함, 워싱 효과.', cons: '이염 주의, 무거움.', usage: '청바지, 자켓.', tip: '온스(oz)로 두께 구분.' },
            { cat: '원단 (직기/천연)', sub: '면', name: '캔버스 (Canvas)', alias: '호로', desc: '매우 굵은 실로 두껍게 짠 평직물.', pros: '내구성 최강, 방수 가능.', cons: '뻣뻣하고 무거움.', usage: '스니커즈, 가방, 텐트.', tip: '10수 이상 굵은 실 사용.' },
            { cat: '원단 (직기/천연)', sub: '면', name: '시어서커 (Seersucker)', alias: '지지미', desc: '경사의 장력을 다르게 하여 표면에 오목볼목한 주름을 만든 직물.', pros: '피부에 닿는 면적이 적어 시원함.', cons: '겨울엔 추움.', usage: '여름 셔츠, 파자마.', tip: '다림질이 필요 없는 대표적 여름 원단.' },
            { cat: '원단 (직기/천연)', sub: '면', name: '샴브레이 (Chambray)', alias: '', desc: '경사는 색실, 위사는 흰실을 사용한 평직물. 데님과 비슷하나 훨씬 얇음.', pros: '가볍고 통기성 우수.', cons: '구김이 생김.', usage: '여름 셔츠, 원피스.', tip: '데님 느낌을 내고 싶을 때 대체재로 훌륭함.' },
            { cat: '원단 (직기/천연)', sub: '면', name: '플라넬 (Flannel)', alias: '법넬', desc: '표면을 긁어 미세한 기모를 낸 부드러운 직물.', pros: '따뜻하고 부드러움.', cons: '보풀(Pilling) 발생.', usage: '가을/겨울 체크 셔츠, 파자마.', tip: '기모 방향을 맞춰 재단해야 함.' },
            { cat: '원단 (직기/천연)', sub: '마', name: '린넨 (Linen)', alias: '아마', desc: '아마 식물 줄기에서 얻은 섬유.', pros: '통기성 최강, 시원함.', cons: '구김이 매우 심함, 까슬거림.', usage: '여름 의류 전체.', tip: '구김 자체가 멋인 소재.' },
            { cat: '원단 (직기/천연)', sub: '모', name: '트위드 (Tweed)', alias: '', desc: '방모사를 사용하여 거칠게 짠 직물.', pros: '보온성, 독특한 텍스처.', cons: '올 풀림 심함, 피부 자극.', usage: '샤넬 자켓, 코트.', tip: '전체 심지 작업 권장.' },
            { cat: '원단 (직기/천연)', sub: '모', name: '개버딘 (Gabardine)', alias: '개바', desc: '급경사 능직으로 짠 고밀도 직물.', pros: '단단하고 구김 적음, 발수성.', cons: '번들거림(광) 생길 수 있음.', usage: '트렌치코트, 유니폼.', tip: '버버리 코트의 원조 원단.' },
            { cat: '원단 (직기/천연)', sub: '모', name: '서지 (Serge)', alias: '사지', desc: '가장 일반적인 정장용 모직물(능직).', pros: '실용적, 내구성 좋음.', cons: '오래 입으면 엉덩이 번들거림.', usage: '교복, 사무복, 정장.', tip: '가장 무난한 양복지.' },
            { cat: '원단 (직기/천연)', sub: '모', name: '멜톤 (Melton)', alias: '', desc: '축융 가공하여 조직이 안 보이고 펠트 같은 모직물.', pros: '보온성 최고, 절단면 안 풀림.', cons: '무거움, 뻣뻣함.', usage: '피코트, 더플코트.', tip: '올이 안 풀려 컷오프 가능.' },
            { cat: '원단 (직기/천연)', sub: '견', name: '시폰 (Chiffon)', alias: '쉬폰', desc: '얇고 투명하며 하늘거리는 견직물.', pros: '여성스러움, 드레이프성.', cons: '비침, 봉제 어려움.', usage: '블라우스, 원피스.', tip: '말아박기나 인터록으로 마감.' },
            { cat: '원단 (직기/천연)', sub: '견', name: '오간자 (Organza)', alias: '노방', desc: '얇고 투명하지만 빳빳한 힘이 있는 직물.', pros: '볼륨감 형성.', cons: '구김 잘 감, 까슬거림.', usage: '드레스, 한복.', tip: '통솔 봉제 필수.' },
            { cat: '원단 (직기/천연)', sub: '견', name: '새틴 (Satin)', alias: '공단', desc: '수자직으로 짜 광택이 매우 강한 직물.', pros: '화려한 광택, 부드러움.', cons: '올 뜯김(스크래치) 주의.', usage: '이브닝 드레스, 안감.', tip: '물 얼룩에 주의.' },
            { cat: '원단 (직기/합성)', sub: '재생', name: '레이온 (Rayon)', alias: '인견', desc: '목재 펄프를 녹여 만든 재생 섬유.', pros: '실크 같은 촉감, 흡습성, 찰랑거림.', cons: '물에 젖으면 약해짐, 수축.', usage: '여름 원피스, 안감.', tip: '물세탁 시 줄어드니 드라이 권장.' },
            { cat: '원단 (직기/합성)', sub: '재생', name: '텐셀 (Tencel)', alias: '리오셀', desc: '유칼립투스 나무 추출물로 만든 친환경 섬유.', pros: '매우 부드러움, 강한 내구성.', cons: '가격이 다소 높음.', usage: '고급 내의, 침구, 셔츠.', tip: '피부 자극이 거의 없음.' },
            { cat: '원단 (직기/합성)', sub: '재생', name: '큐프라 (Cupro)', alias: '큐라', desc: '목화 씨의 솜털로 만든 고급 재생 섬유.', pros: '정전기 방지, 매끄러움.', cons: '물에 약함.', usage: '고급 정장 안감(Ura).', tip: '폴리 안감보다 훨씬 고급임.' },
            { cat: '원단 (직기/합성)', sub: '합성', name: '타프타 (Taffeta)', alias: '다후다', desc: '바스락거리는 소리가 나는 나일론/폴리 평직물.', pros: '형태 안정, 광택.', cons: '주름이 잘 생김.', usage: '안감, 바람막이.', tip: '저렴한 안감의 대명사.' },
            { cat: '원단 (직기/합성)', sub: '합성', name: '립스탑 (Ripstop)', alias: '', desc: '바둑판 형태로 강한 실을 넣어 찢어짐을 방지한 원단.', pros: '내구성, 찢어져도 확산 안 됨.', cons: '투박한 외관.', usage: '군복, 등산복, 텐트.', tip: '격자 무늬가 특징.' },
            { cat: '원단 (직기/합성)', sub: '합성', name: '자카드 (Jacquard)', alias: '', desc: '직조 기계로 무늬를 입체적으로 짜낸 원단.', pros: '프린트가 아닌 직조 무늬로 고급스러움.', cons: '두껍고 단가가 높음.', usage: '고급 자켓, 커튼, 넥타이.', tip: '원단 뒷면에 실이 얽힌 구조가 보임.' },

        ];

        function init() {
            const sidebar = document.getElementById('categoryNav');
            const categories = new Map();
            DB.forEach(item => { if (!categories.has(item.cat)) categories.set(item.cat, new Set()); categories.get(item.cat).add(item.sub); });
            let navHTML = '';
            for (const [cat, subs] of categories) {
                let icon = 'hash';
                if(cat.includes('원단')) icon = 'shirt';
                else if(cat.includes('부자재')) icon = 'package-plus';
                else if(cat.includes('봉제')) icon = 'scissors';
                else if(cat.includes('패턴')) icon = 'ruler';
                else if(cat.includes('후가공')) icon = 'droplets';
                else if(cat.includes('특수')) icon = 'sparkles';
                navHTML += `<div class="mb-6"><h3 class="px-4 text-xs font-bold text-emerald-400 uppercase tracking-widest mb-3 flex items-center gap-2"><i data-lucide="${icon}" class="w-4 h-4 text-emerald-500"></i>${cat}</h3><div class="space-y-1">${[...subs].map(sub => `<button onclick="filter('${cat}', '${sub}')" class="w-full text-left px-4 py-2 text-sm rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors flex items-center gap-3 group"><span class="w-1.5 h-1.5 rounded-full bg-slate-700 group-hover:bg-emerald-400 transition-colors"></span>${sub}</button>`).join('')}</div></div>`;
            }
            sidebar.innerHTML = navHTML;
            document.getElementById('totalCount').innerText = DB.length;
            renderGrid(DB);
            if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        }

        function renderGrid(data) {
            const grid = document.getElementById('gridContainer');
            const empty = document.getElementById('emptyState');
            if (data.length === 0) { grid.innerHTML = ''; empty.classList.remove('hidden'); empty.classList.add('flex'); return; }
            empty.classList.add('hidden'); empty.classList.remove('flex');
            grid.innerHTML = data.map(item => `<div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 p-6 garment-card flex flex-col relative group h-full transition-colors"><div class="mb-5"><div class="flex flex-wrap gap-2 mb-3"><span class="px-2.5 py-1 text-[10px] font-bold bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300 rounded-md border border-slate-200 dark:border-slate-600 uppercase tracking-wide">${item.cat}</span><span class="px-2.5 py-1 text-[10px] font-bold bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 rounded-md border border-emerald-100 dark:border-emerald-800/50 uppercase tracking-wide">${item.sub}</span></div><h3 class="text-lg font-bold text-slate-800 dark:text-slate-100 group-hover:text-emerald-600 dark:group-hover:text-emerald-400 transition-colors flex items-center gap-2">${item.name}</h3>${item.alias ? `<p class="text-xs text-rose-500 dark:text-rose-400 mt-1 font-mono font-medium flex items-center gap-1"><i data-lucide="message-square" class="w-3 h-3"></i> "${item.alias}"</p>` : ''}</div><div class="text-sm text-slate-600 dark:text-slate-400 leading-relaxed mb-6 flex-1 border-b border-dashed border-slate-100 dark:border-slate-700 pb-4">${item.desc}</div><div class="grid grid-cols-2 gap-3 mb-4 text-xs"><div class="bg-emerald-50/50 dark:bg-emerald-900/20 p-3 rounded-xl border border-emerald-100/50 dark:border-emerald-800/30"><strong class="text-emerald-700 dark:text-emerald-400 block mb-1.5 flex items-center gap-1.5"><i data-lucide="thumbs-up" class="w-3 h-3"></i> 장점</strong><span class="text-slate-600 dark:text-slate-400 leading-tight block">${item.pros}</span></div><div class="bg-rose-50/50 dark:bg-rose-900/20 p-3 rounded-xl border border-rose-100/50 dark:border-rose-800/30"><strong class="text-rose-700 dark:text-rose-400 block mb-1.5 flex items-center gap-1.5"><i data-lucide="thumbs-down" class="w-3 h-3"></i> 단점</strong><span class="text-slate-600 dark:text-slate-400 leading-tight block">${item.cons}</span></div></div><div class="mt-auto space-y-3"><div class="flex items-start gap-2 text-xs"><span class="text-slate-400 dark:text-slate-500 font-bold w-10 shrink-0 uppercase tracking-wider text-[10px] mt-0.5">Usage</span><span class="text-slate-700 dark:text-slate-300 font-medium">${item.usage}</span></div><div class="flex items-start gap-2 text-xs bg-amber-50 dark:bg-amber-900/20 p-2.5 rounded-lg text-amber-900 dark:text-amber-200 border border-amber-100/50 dark:border-amber-800/30"><i data-lucide="lightbulb" class="w-3.5 h-3.5 mt-0.5 shrink-0 text-amber-500 fill-amber-500"></i><span class="font-medium tag-pill leading-snug">${item.tip}</span></div></div></div>`).join('');
            lucide.createIcons();
        }

        window.filter = (cat, sub) => {
            const title = document.getElementById('currentCategoryTitle');
            let filtered = DB;
            if (cat === 'ALL') { title.innerHTML = '<i data-lucide="layers" class="text-emerald-600 dark:text-emerald-400"></i> 전체 라이브러리'; } 
            else { 
                filtered = DB.filter(item => item.cat === cat); 
                title.innerHTML = cat; 
                if (sub) { filtered = filtered.filter(item => item.sub === sub); title.innerHTML = `<span class="text-slate-400">${cat}</span> <i data-lucide="chevron-right" class="inline w-4 h-4 mx-1 text-slate-300"></i> ${sub}`; } 
            }
            renderGrid(filtered);
            if(window.innerWidth < 768) toggleMenu();
            document.getElementById('mainScroll').scrollTo({ top: 0, behavior: 'smooth' });
            lucide.createIcons();
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = DB.filter(item => item.name.toLowerCase().includes(term) || item.alias.toLowerCase().includes(term) || item.desc.toLowerCase().includes(term) || item.tip.toLowerCase().includes(term));
            renderGrid(filtered);
        });

        function toggleDarkMode() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) { html.classList.remove('dark'); localStorage.setItem('theme', 'light'); } 
            else { html.classList.add('dark'); localStorage.setItem('theme', 'dark'); }
        }

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.classList.add('dark'); } 
        else { document.documentElement.classList.remove('dark'); }

        const mobileBtn = document.getElementById('mobileMenuBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        function toggleMenu() {
            const isClosed = sidebar.classList.contains('-translate-x-full');
            if(isClosed) { sidebar.classList.remove('-translate-x-full'); overlay.classList.remove('hidden'); document.body.style.overflow = 'hidden'; } 
            else { sidebar.classList.add('-translate-x-full'); overlay.classList.add('hidden'); document.body.style.overflow = 'auto'; }
        }

        mobileBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

        init();
    </script>
</body>
</html>
